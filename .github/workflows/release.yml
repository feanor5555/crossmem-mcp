name: Release

# Triggered by pushing a ``v*`` tag (e.g. ``git tag v0.1.0 && git push --tags``).
# Publishing uses PyPI Trusted Publishers (OIDC) — there is no long-lived API
# token in the repository secrets. Artifacts are signed with Sigstore before
# upload so consumers can verify provenance.

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distribution
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishers)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/crossmem
    permissions:
      id-token: write  # required for PyPI Trusted Publishers (OIDC)
      contents: read

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  sign:
    name: Sign artifacts with Sigstore
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Sigstore keyless signing (OIDC)
      contents: write  # required to attach signatures to the GitHub release

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl

      - name: Attach signatures to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sigstore.json
